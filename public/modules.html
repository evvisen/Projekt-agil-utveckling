<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moduler – Vuxenpoäng</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/modules.css" />
</head>

<body>
  <div class="app">

    <aside class="sidebar" aria-label="Sidomeny">
      <div class="brand">
        <img class="brand__logo" src="images/Logo.svg" alt="Vuxenpoäng" />
      </div>

      <nav class="nav nav--sidebar" aria-label="Sidonavigering">
        <a class="nav__item" href="dashboard.html">
          <span class="nav__icon"><img src="images/home.svg" alt="" /></span>
          <span class="nav__label">Översikt</span>
        </a>

        <a class="nav__item is-active" href="modules.html" aria-current="page">
          <span class="nav__icon"><img src="images/moduler-active.svg" alt="" /></span>
          <span class="nav__label">Moduler</span>
        </a>

        <a class="nav__item" href="framsteg.html">
          <span class="nav__icon"><img src="images/framsteg.svg" alt="" /></span>
          <span class="nav__label">Framsteg</span>
        </a>

        <a class="nav__item" href="prestationer.html">
          <span class="nav__icon"><img src="images/medal.svg" alt="" /></span>
          <span class="nav__label">Prestationer</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="user">
          <img class="user__img" src="images/profile-pic.png" alt="Profilbild" />
          <div class="user__text">
            <div class="user__name" data-user-name>Oskar O.</div>
            <div class="user__meta" data-user-meta>Nivå 4 • Grundare</div>
          </div>
        </div>
      </div>
    </aside>

    <header class="topbar">
      <div class="topbar__left">
        <div class="brand brand--topbar">
          <img class="brand__logo" src="images/Logo.svg" alt="Vuxenpoäng" />
        </div>

        <div class="breadcrumbs" aria-label="Brödsmulor">
          <span class="breadcrumbs__muted">Hem</span>
          <span class="breadcrumbs__sep">›</span>
          <span class="breadcrumbs__current">Moduler</span>
        </div>
      </div>

      <div class="topbar__right">
        <div class="streak" aria-label="Streak">
          <img class="streak__icon" src="images/flame.svg" alt="" />
          <span class="streak__count" data-streak>3 dagar i rad</span>
        </div>

        <button class="icon-btn" type="button" aria-label="Notiser">
          <img src="images/notiser.svg" alt="" />
        </button>

        <button class="avatar" type="button" aria-label="Profil">
          <img class="avatar__img" src="images/profile-pic.png" alt="Profilbild" />
        </button>
      </div>
    </header>

    <main class="content">
      <div class="grid">
        <section class="main">
          <div class="page-head">
            <h1 class="page-title">Hej, <span data-first-name>Oskar</span>! <span class="wave">👋</span></h1>
            <p class="page-sub">Välj en modul för att fortsätta.</p>
          </div>

          <section class="modules">
            <div id="modulesGrid" class="modules__grid" aria-label="Moduler"></div>

            <button class="load-more" type="button" id="loadMoreBtn">
              Laddar fler <span class="load-more__icon" aria-hidden="true">↓</span>
            </button>

            <div class="coming-soon" aria-label="Kommer snart">
              <div class="coming-soon__title">Kommer Snart</div>
              <div class="coming-soon__card">
                <img class="lock__icon" src="images/lock.svg" alt="Hänglos" />

                <div>
                  <div class="coming-soon__name">Jobb och Lön</div>
                  <div class="coming-soon__desc">Allt som händer när man får jobb</div>
                </div>
              </div>
            </div>
          </section>
        </section>

        <aside class="right">
          <div class="stats-row">
            <div class="card stat">
              <div class="stat__label">TOTALA POÄNG</div>
              <div class="stat__value purple" data-total-points>420</div>
            </div>

            <div class="card stat">
              <div class="stat__label">NIVÅ</div>
              <div class="stat__value">
                <span data-level>4</span> <span class="stat__small">/10</span>
              </div>
            </div>
          </div>

          <div class="card chart">
            <div class="chart__head">
              <div class="chart__title">Veckoaktivitet</div>
              <button class="icon-btn" type="button" aria-label="Diagram">
                <img src="images/graph.svg" alt="" />
              </button>
            </div>

            <div class="bars" aria-hidden="true">
              <div class="bar" style="height: 18%"></div>
              <div class="bar" style="height: 35%"></div>
              <div class="bar" style="height: 60%"></div>
              <div class="bar bar--purple" style="height: 78%"></div>
              <div class="bar" style="height: 42%"></div>
              <div class="bar" style="height: 28%"></div>
              <div class="bar" style="height: 22%"></div>
            </div>

            <div class="days">
              <span>M</span><span>T</span><span>O</span><span>T</span><span>F</span><span>L</span><span>S</span>
            </div>
          </div>

          <div class="mods">
            <div class="mods__title">ALLA MODULER</div>
            <div id="modulesRail"></div>
          </div>
        </aside>
      </div>
    </main>

    <nav class="nav nav--bottom" aria-label="Huvudmeny">
      <a class="nav__item" href="dashboard.html">
        <span class="nav__icon"><img src="images/home.svg" alt="" /></span>
        <span class="nav__label">Hem</span>
      </a>

      <a class="nav__item is-active" href="modules.html" aria-current="page">
        <span class="nav__icon"><img src="images/moduler-active.svg" alt="" /></span>
        <span class="nav__label">Moduler</span>
      </a>

      <a class="nav__item" href="framsteg.html">
        <span class="nav__icon"><img src="images/framsteg.svg" alt="" /></span>
        <span class="nav__label">Framsteg</span>
      </a>
    </nav>

  </div>

  <script type="module" src="js/modules.js"></script>
</body>

</html>
